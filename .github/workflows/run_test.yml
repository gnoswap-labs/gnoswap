name: run-test

on:
  pull_request:

jobs:
  generate-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.4

      - name: Install bundler
        run: gem install bundler

      - name: Install ruby gems
        run: bundle install

      - name: Generate test matrix
        id: set-matrix
        run: |
          chmod +x .github/scripts/generate_matrix.rb
          echo "matrix=$(ruby .github/scripts/generate_matrix.rb contract tests/scenario)" >> $GITHUB_OUTPUT

  setup-gno:
    runs-on: ubuntu-latest
    steps:
      - name: Check out gno (master)
        run: |
          git clone --depth 1 https://github.com/gnoswap-labs/gno.git gno -b master

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: gno/go.sum

      - name: Build gno
        run: |
          cd gno
          make install.gno

      - name: Upload gno binary
        uses: actions/upload-artifact@v4
        with:
          name: gno-bin
          path: ~/go/bin/gno
          retention-days: 1

  test-gnoswap:
    needs: [generate-matrix, setup-gno]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{fromJson(needs.generate-matrix.outputs.matrix)}}

    steps:
      - name: Check out gnoswap repo
        uses: actions/checkout@v4

      - name: Check out gno (master)
        run: |
          git clone --depth 1 https://github.com/gnoswap-labs/gno.git gno -b master

      - name: Link contracts into gno/examples/gno.land (setup.py, same as Makefile)
        run: python3 setup.py -w .

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: gno/go.sum

      - name: Download gno binary
        uses: actions/download-artifact@v4
        with:
          name: gno-bin
          path: ~/go/bin

      - name: Make gno binary executable
        run: chmod +x ~/go/bin/gno

      - name: Update fuzz test seed
        run: |
          chmod +x .github/scripts/update_fuzz_seed.sh
          .github/scripts/update_fuzz_seed.sh

      - name: "Run tests for ${{ matrix.name }}"
        run: |
          chmod +x .github/scripts/run_tests.rb
          ruby .github/scripts/run_tests.rb \
            -p "${{ matrix.pkg }}" \
            -r "/home/runner/work/gnoswap/gnoswap/gno"
